name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.2 ndk;25.2.9519653'

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Cache Qt6 Build
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg_installed
          ${{ github.workspace }}/build/CMakeCache.txt
        key: qt6-android-${{ matrix.abi }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          qt6-android-${{ matrix.abi }}-

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Set VCPKG triplet
      id: set_triplet
      run: |
        if [ "${{ matrix.abi }}" == "arm64-v8a" ]; then
          echo "triplet=arm64-android" >> $GITHUB_OUTPUT
        elif [ "${{ matrix.abi }}" == "armeabi-v7a" ]; then
          echo "triplet=arm-android" >> $GITHUB_OUTPUT
        fi

    - name: Configure CMake
      run: |
        cmake -B build \
          -S . \
          -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=${{ steps.set_triplet.outputs.triplet }} \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-33 \
          -DANDROID_NDK=${{ env.ANDROID_NDK_HOME }} \
          -DANDROID_SDK_ROOT=${{ env.ANDROID_SDK_ROOT }} \
          -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} \
          -DQT_HOST_PATH=/usr/lib/x86_64-linux-gnu/cmake

    - name: Build
      run: cmake --build build --config ${{ github.event.inputs.build_type }} --parallel $(nproc)

    - name: Generate APK
      run: |
        cmake --build build --target apk
        mkdir -p artifacts
        find build -name "*.apk" -exec cp {} artifacts/socialapp-${{ matrix.abi }}.apk \;

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SocialApp-${{ matrix.abi }}-${{ github.run_id }}
        path: artifacts/*.apk
        retention-days: 30

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }} - ${{ github.event.inputs.build_type }}
        files: artifacts/*.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}